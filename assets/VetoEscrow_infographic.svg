<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">VetoEscrow infographic</title>
  <desc id="desc">A dark pipeline diagram showing high-risk AI decisions locked in escrow, priced human interruption rights, clearing outcomes, ledger, and audit report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#142536"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2c44"/>
      <stop offset="1" stop-color="#162232"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b86b4"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text id="titleText" x="60" y="78" fill="#eaf0fb" font-size="40" font-weight="700">VetoEscrow</text>
  <text x="60" y="116" fill="#9db4d8" font-size="22">Interruptible Clearing Gate - priced human veto and modify rights for high-risk AI actions</text>
  <text x="60" y="150" fill="#6f86ad" font-size="15">IDEA-014 - lens L22 Sequence Reorder + L2 Power Inversion - clearing-market - stdlib-only</text>

  <rect x="50" y="210" width="210" height="150" rx="14" fill="url(#card)" stroke="#2c416b" stroke-width="1"/>
  <text x="155" y="250" fill="#eaf0fb" font-size="20" font-weight="700" text-anchor="middle">AI Decision</text>
  <text x="155" y="284" fill="#9db4d8" font-size="14" text-anchor="middle">agent action</text>
  <text x="155" y="306" fill="#9db4d8" font-size="14" text-anchor="middle">risk class + impact</text>
  <text x="155" y="338" fill="#6f86ad" font-size="13" text-anchor="middle">autonomy stake</text>

  <rect x="300" y="210" width="200" height="150" rx="14" fill="url(#card)" stroke="#2c416b" stroke-width="1"/>
  <text x="400" y="250" fill="#eaf0fb" font-size="20" font-weight="700" text-anchor="middle">Risk Gate</text>
  <text x="400" y="284" fill="#9db4d8" font-size="14" text-anchor="middle">impact + uncertainty</text>
  <text x="400" y="306" fill="#9db4d8" font-size="14" text-anchor="middle">threshold lock</text>
  <text x="400" y="338" fill="#6f86ad" font-size="13" text-anchor="middle">L22 before release</text>

  <rect x="540" y="190" width="230" height="190" rx="14" fill="#1d3457" stroke="#3f72c4" stroke-width="2"/>
  <text x="655" y="228" fill="#eaf0fb" font-size="21" font-weight="700" text-anchor="middle">Interruption Market</text>
  <text x="655" y="254" fill="#7fa8e6" font-size="13" text-anchor="middle">L2: AI buys autonomy</text>
  <rect x="556" y="272" width="92" height="34" rx="8" fill="#1c3a2a" stroke="#3a8f5f"/>
  <text x="602" y="295" fill="#7fe0a8" font-size="13" font-weight="700" text-anchor="middle">RELEASE</text>
  <rect x="556" y="314" width="92" height="34" rx="8" fill="#3a3320" stroke="#b79438"/>
  <text x="602" y="337" fill="#f0d68a" font-size="13" font-weight="700" text-anchor="middle">MODIFY</text>
  <rect x="662" y="293" width="92" height="34" rx="8" fill="#3a2024" stroke="#bb5563"/>
  <text x="708" y="316" fill="#f0a0ab" font-size="13" font-weight="700" text-anchor="middle">VETO</text>

  <rect x="820" y="210" width="150" height="150" rx="14" fill="url(#card)" stroke="#2c416b" stroke-width="1"/>
  <text x="895" y="250" fill="#eaf0fb" font-size="18" font-weight="700" text-anchor="middle">Ledger</text>
  <text x="895" y="282" fill="#9db4d8" font-size="13" text-anchor="middle">append-only</text>
  <text x="895" y="302" fill="#9db4d8" font-size="13" text-anchor="middle">hash-chained</text>
  <text x="895" y="334" fill="#6f86ad" font-size="12" text-anchor="middle">tamper-evident</text>

  <rect x="1010" y="210" width="140" height="150" rx="14" fill="url(#card)" stroke="#2c416b" stroke-width="1"/>
  <text x="1080" y="250" fill="#eaf0fb" font-size="18" font-weight="700" text-anchor="middle">Audit</text>
  <text x="1080" y="282" fill="#9db4d8" font-size="13" text-anchor="middle">JSON +</text>
  <text x="1080" y="302" fill="#9db4d8" font-size="13" text-anchor="middle">markdown</text>
  <text x="1080" y="334" fill="#6f86ad" font-size="12" text-anchor="middle">awards + head</text>

  <line x1="262" y1="285" x2="298" y2="285" stroke="#5b86b4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="502" y1="285" x2="538" y2="285" stroke="#5b86b4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="772" y1="285" x2="818" y2="285" stroke="#5b86b4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="972" y1="285" x2="1008" y2="285" stroke="#5b86b4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="60" y="470" fill="#8fa6cb" font-size="17">High-risk actions lock before release; supervisors clear MODIFY or VETO rights only when bids meet the interruption price.</text>
  <text x="60" y="586" fill="#64789c" font-size="14">Indicative AI-control clearing and evidence trail - not a legal exchange, broker-dealer, insurer, or production access-control system.</text>
</svg>
