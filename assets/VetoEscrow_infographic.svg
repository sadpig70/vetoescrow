<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">VetoEscrow infographic</title>
  <desc id="desc">Pipeline from AI decision to risk gate, priced interruption right, human bid clearing, and tamper-evident ledger.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#182838"/>
      <stop offset="1" stop-color="#263238"/>
    </linearGradient>
    <style>
      .title{font:700 54px Arial,sans-serif;fill:#f7fbff}
      .sub{font:400 22px Arial,sans-serif;fill:#b9c8d6}
      .card{fill:#f7fbff;stroke:#7bb6a4;stroke-width:3;rx:8}
      .h{font:700 24px Arial,sans-serif;fill:#102028}
      .p{font:400 17px Arial,sans-serif;fill:#29404a}
      .tag{font:700 15px Arial,sans-serif;fill:#0f2c35}
      .foot{font:400 16px Arial,sans-serif;fill:#c2ccd4}
      .arrow{stroke:#f0b35a;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="86" class="title">VetoEscrow</text>
  <text x="72" y="124" class="sub">Price human veto and modify rights before high-risk AI actions release.</text>
  <g transform="translate(70 190)">
    <rect class="card" width="190" height="190"/>
    <text x="22" y="45" class="h">AI decision</text>
    <text x="22" y="84" class="p">agent action</text>
    <text x="22" y="112" class="p">risk class</text>
    <text x="22" y="140" class="p">autonomy stake</text>
    <text x="22" y="170" class="tag">input</text>
  </g>
  <path class="arrow" d="M280 285 H345 l-16 -16 M345 285 l-16 16"/>
  <g transform="translate(370 190)">
    <rect class="card" width="190" height="190"/>
    <text x="22" y="45" class="h">Risk gate</text>
    <text x="22" y="84" class="p">impact +</text>
    <text x="22" y="112" class="p">uncertainty</text>
    <text x="22" y="140" class="p">threshold lock</text>
    <text x="22" y="170" class="tag">L22</text>
  </g>
  <path class="arrow" d="M580 285 H645 l-16 -16 M645 285 l-16 16"/>
  <g transform="translate(670 190)">
    <rect class="card" width="190" height="190"/>
    <text x="22" y="45" class="h">Escrow price</text>
    <text x="22" y="84" class="p">autonomy stake</text>
    <text x="22" y="112" class="p">interruption right</text>
    <text x="22" y="140" class="p">modify or veto</text>
    <text x="22" y="170" class="tag">L2</text>
  </g>
  <path class="arrow" d="M880 285 H945 l-16 -16 M945 285 l-16 16"/>
  <g transform="translate(970 190)">
    <rect class="card" width="160" height="190"/>
    <text x="22" y="45" class="h">Ledger</text>
    <text x="22" y="84" class="p">award</text>
    <text x="22" y="112" class="p">outcome</text>
    <text x="22" y="140" class="p">hash chain</text>
    <text x="22" y="170" class="tag">audit</text>
  </g>
  <rect x="70" y="442" width="1060" height="78" rx="8" fill="#0d141a" stroke="#3d6f77" stroke-width="2"/>
  <text x="96" y="477" class="sub">Outcomes: released | held_unclaimed | modify_right_sold | veto_right_sold</text>
  <text x="96" y="506" class="foot">Indicative control clearing only; not a legal exchange, broker-dealer, insurer, or production access-control system.</text>
</svg>
