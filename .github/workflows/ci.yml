name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e . pytest
      - run: python -m pytest -q
      - run: python -m vetoescrow sample -o examples/decision_batch.json
      - run: python -m vetoescrow run -i examples/decision_batch.json --full -o examples/clearing_report.json
      - run: python -m vetoescrow verify-ledger -i examples/clearing_report.json
